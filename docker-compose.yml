services:

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - banking

  banking:
    build: .
    expose:
      - "5001"
    environment: 
      - ECOMMERCE_PUBLIC_BASE=http://3.90.15.65
