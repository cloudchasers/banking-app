<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transaction Result</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }
        .card {
            background: white;
            padding: 40px 32px;
            border-radius: 16px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 400px;
        }
        .icon { font-size: 64px; margin-bottom: 16px; }
        .success-text { color: #16a34a; margin-top: 0; }
        .error-text { color: #dc2626; margin-top: 0; }
        p { color: #4b5563; line-height: 1.5; }
    </style>
</head>
<body>
    <div class="card">
        {% if success %}
            <div class="icon">✅</div>
            <h2 class="success-text">Payment Successful</h2>
            <p>Your transaction has been processed securely.</p>
            <p><strong>This window will close automatically in a moment...</strong></p>
            <script>
                setTimeout(() => {
                    window.close();
                }, 3000);
            </script>
        {% else %}
            <div class="icon">❌</div>
            <h2 class="error-text">Payment Failed</h2>
            <p>There was an issue processing your transaction. Please try scanning the QR code again.</p>
        {% endif %}
    </div>
</body>
</html>
