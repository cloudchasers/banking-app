<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scan QR Code</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .card {
            background: white;
            padding: 32px;
            border-radius: 16px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        h2 { margin-top: 0; color: #111827; }
        .subtitle {
            color: #4b5563;
            font-size: 15px;
            margin-bottom: 24px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>Scan to Pay</h2>
        <p class="subtitle">Open your Banking App and scan this QR code to proceed with payment.</p>
        
        <!-- Display QR Code -->
        <div style="margin-bottom: 24px;">
            <img src="/qrcode?data={{ token }}" alt="Payment QR Code" style="max-width: 100%; border-radius: 8px; border: 1px solid #e5e7eb;">
        </div>
    </div>
</body>
</html>
