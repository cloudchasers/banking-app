<!DOCTYPE html>
<html lang="en">
<head>
    <!-- This meta tag is mandatory for mobile responsiveness -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review Transaction</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .card {
            background: white;
            padding: 32px;
            border-radius: 16px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 400px; /* Limits width on PC, fills screen on mobile */
        }
        h2 { margin-top: 0; color: #111827; text-align: center; }
        .details { background: #f9fafb; padding: 16px; border-radius: 8px; margin-bottom: 24px; }
        .row { display: flex; justify-content: space-between; margin-bottom: 8px; color: #4b5563; font-size: 14px;}
        .row.total { font-weight: bold; color: #111827; font-size: 18px; margin-bottom: 0; border-top: 1px solid #e5e7eb; padding-top: 8px; margin-top: 8px; }
        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            background-color: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .btn:hover { background-color: #1d4ed8; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Confirm Payment</h2>
        <div class="details">
            <div class="row"><span>Payee:</span> <span style="text-transform: uppercase;">{{ tx.user }}</span></div>
            <div class="row"><span>Merchant:</span> <span>{{ tx.merchant_name }}</span></div>
            <div class="row"><span>Order ID:</span> <span>ODR-{{ tx.order_id }}</span></div>
            <div class="row total"><span>Amount:</span> <span>₱{{ tx.amount }}</span></div>
        </div>
        

        <!-- Submitting this form triggers the /process route -->
        <form action="/process" method="POST">
            <input type="hidden" name="order_id" value="{{ tx.order_id }}">
            <input type="hidden" name="amount" value="{{ tx.amount }}">
            <button type="submit" class="btn">Authorize Payment</button>
        </form>

    </div>
</body>
</html>
